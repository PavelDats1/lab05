name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt update && sudo apt install -y cmake build-essential libgtest-dev

    - name: Configure
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build

    - name: Run tests
      run: ./build/tests
